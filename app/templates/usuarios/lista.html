{% extends "base.html" %}
{% block title %}Usuarios{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h1 class="h3">Usuarios</h1>
  <a class="btn btn-primary" href="{{ url_for('usuarios.crear') }}">Nuevo usuario</a>
</div>

<table class="table table-striped">
  <thead>
    <tr>
      <th>Usuario</th>
      <th>Rol</th>
      <th>Activo</th>
      <th style="width:120px;">Acciones</th>
    </tr>
  </thead>
  <tbody>
    {% for u in usuarios %}
    <tr>
      <td>{{ u.username }}</td>
      <td>{{ u.rol.nombre }}</td>
      <td>{{ "Sí" if u.activo else "No" }}</td>
      <td>
        <a class="btn btn-sm btn-warning" href="{{ url_for('usuarios.editar', user_id=u.id) }}">Editar</a>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
