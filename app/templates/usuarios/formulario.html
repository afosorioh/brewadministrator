{% extends "base.html" %}
{% block title %}Usuario{% endblock %}
{% block content %}
{% if accion == "crear" %}
  <h1 class="h3 mb-3">Nuevo usuario</h1>
{% else %}
  <h1 class="h3 mb-3">Editar usuario</h1>
{% endif %}

<form method="post" class="card p-3">
  <div class="mb-3">
    <label class="form-label">Username</label>
    <input class="form-control" name="username" required value="{{ usuario.username if usuario else '' }}">
  </div>

  <div class="mb-3">
    <label class="form-label">Rol</label>
    <select class="form-select" name="id_rol" required>
      {% for r in roles %}
        <option value="{{ r.id }}" {% if usuario and usuario.id_rol == r.id %}selected{% endif %}>
          {{ r.nombre }}
        </option>
      {% endfor %}
    </select>
  </div>

  <div class="form-check mb-3">
    <input class="form-check-input" type="checkbox" name="activo" id="activo"
           {% if not usuario or usuario.activo %}checked{% endif %}>
    <label class="form-check-label" for="activo">Activo</label>
  </div>

  {% if accion == "crear" %}
    <div class="mb-3">
      <label class="form-label">Contraseña</label>
      <input type="password" class="form-control" name="password" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Confirmar contraseña</label>
      <input type="password" class="form-control" name="password2" required>
    </div>
  {% else %}
    <hr>
    <h6>Cambiar contraseña (opcional)</h6>
    <div class="mb-3">
      <label class="form-label">Nueva contraseña</label>
      <input type="password" class="form-control" name="new_password">
    </div>
    <div class="mb-3">
      <label class="form-label">Confirmar nueva contraseña</label>
      <input type="password" class="form-control" name="new_password2">
    </div>
  {% endif %}

  <button class="btn btn-primary">Guardar</button>
  <a class="btn btn-secondary" href="{{ url_for('usuarios.lista') }}">Cancelar</a>
</form>
{% endblock %}
