{% extends "base.html" %}
{% block title %}Llenado de barriles{% endblock %}

{% block content %}
<h1 class="h3 mb-3">Llenado de barriles</h1>

<form method="post" class="card p-3">
  <div class="row g-3">
    <div class="col-md-4">
    <label class="form-label">Barril</label>
        <div class="input-group">
            <select name="id_barril" id="id_barril_llenado" class="form-select" required>
            <option value="">-- Seleccionar barril --</option>
            {% for b in barriles %}
                <option value="{{ b.id }}" data-codigo="{{ b.codigo_barril }}">
                {{ b.codigo_barril }} - {{ b.capacidad_litros }} L - {{ b.estado_actual }}
                </option>
            {% endfor %}
            </select>

            <button type="button"
                    class="btn btn-outline-secondary"
                    onclick="abrirScannerQR({
                    targetSelectId: 'id_barril_llenado',
                    targetDisplayId: 'qr_result_llenado'
                    })">
            Escanear QR
            </button>
        </div>
    <div id="qr_result_llenado" class="small mt-2 d-none"></div>
    <div class="form-text">Solo aparecen barriles en estado LIMPIO.</div>
    </div>

    <div class="col-md-4">
      <label class="form-label">Bache</label>
      <select name="id_bache" class="form-select" required>
        <option value="">-- Seleccionar bache --</option>
        {% for b in baches %}
          <option value="{{ b.id }}">
            {{ b.codigo_bache }} - {{ b.nombre_cerveza }} - {{ b.fecha_coccion }}
          </option>
        {% endfor %}
      </select>
    </div>

    <div class="col-md-4">
      <label class="form-label">Volumen llenado (L)</label>
      <input type="number" step="0.01" name="volumen_litros" class="form-control" required>
    </div>

    <div class="col-12">
      <label class="form-label">Comentario</label>
      <textarea name="comentario" class="form-control" rows="2"></textarea>
    </div>
  </div>

  <div class="mt-3">
    <button class="btn btn-primary">Registrar llenado</button>
    <a href="{{ url_for('barriles.lista') }}" class="btn btn-secondary">Cancelar</a>
  </div>
</form>
{% endblock %}
