{% extends "base.html" %}
{% block title %}Alta individual de barril{% endblock %}

{% block content %}
<h1 class="h3 mb-3">Alta individual de barril</h1>

<form method="post" class="card p-3">
  <div class="row g-3">
    <div class="col-md-4">
      <label class="form-label">Código barril</label>
      <div class="input-group">
        <input type="text"
              id="codigo_barril"
              name="codigo_barril"
              class="form-control"
              placeholder="Ej: A001"
              required>
        <button type="button"
                class="btn btn-outline-secondary"
                onclick="abrirScannerQR({
                  targetInputId: 'codigo_barril',
                  targetDisplayId: 'qr_result_alta'
                })">
          Escanear QR
        </button>
      </div>
      <div id="qr_result_alta" class="small mt-2 d-none"></div>
    </div>

    <div class="col-md-4">
      <label class="form-label">Capacidad (L)</label>
      <input type="number" step="0.01" name="capacidad_litros" class="form-control" placeholder="30" required>
    </div>

    <div class="col-md-4">
      <label class="form-label">Fecha ingreso</label>
      <input type="date" name="fecha_ingreso" class="form-control">
    </div>

    <div class="col-12">
      <label class="form-label">Notas</label>
      <textarea name="notas" class="form-control" rows="2"></textarea>
    </div>
  </div>

  <div class="mt-3">
    <button class="btn btn-primary">Guardar</button>
    <a href="{{ url_for('barriles.lista') }}" class="btn btn-secondary">Cancelar</a>
  </div>
</form>
{% endblock %}
