{% extends "base.html" %}
{% block title %}Entrega de barriles{% endblock %}

{% block content %}
<h1 class="h3 mb-3">Entrega de barriles al cliente</h1>

<form method="post" class="card p-3">
  <div class="row g-3">
    <div class="col-md-6">
      <label class="form-label">Barril</label>
      <select name="id_barril" class="form-select" required>
        <option value="">-- Seleccionar barril --</option>
        {% for b in barriles %}
          <option value="{{ b.id }}">
            {{ b.codigo_barril }} - {{ b.capacidad_litros }} L - {{ b.estado_actual }}
          </option>
        {% endfor %}
      </select>
      <div class="form-text">
        Solo aparecen barriles en estado LLENO. El sistema copiará automáticamente el bache y el volumen del último llenado.
      </div>
    </div>

    <div class="col-md-6">
      <label class="form-label">Cliente</label>
      <select name="id_cliente" class="form-select" required>
        <option value="">-- Seleccionar cliente --</option>
        {% for c in clientes %}
          <option value="{{ c.id }}">
            {{ c.nombre }}{% if c.tipo %} - {{ c.tipo }}{% endif %}
          </option>
        {% endfor %}
      </select>
    </div>

    <div class="col-12">
      <label class="form-label">Comentario</label>
      <textarea name="comentario" class="form-control" rows="2"></textarea>
    </div>
  </div>

  <div class="mt-3">
    <button class="btn btn-primary">Registrar entrega</button>
    <a href="{{ url_for('barriles.lista') }}" class="btn btn-secondary">Cancelar</a>
  </div>
</form>
{% endblock %}
