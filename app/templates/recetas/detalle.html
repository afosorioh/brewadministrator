{% extends "base.html" %}

{% block title %}Detalle receta{% endblock %}

{% block content %}
<h1 class="h3 mb-3">{{ receta.nombre }}</h1>

<div class="card">
  <div class="card-body">
    <p><strong>Estilo:</strong> {{ receta.estilo or "-" }}</p>
    <p><strong>Volumen estándar:</strong> {{ receta.volumen_estandar_litros or "-" }} L</p>
    <p><strong>Descripción:</strong><br>{{ receta.descripcion or "-" }}</p>
  </div>
</div>

<div class="mt-3">
  <a href="{{ url_for('recetas.editar', receta_id=receta.id) }}" class="btn btn-warning">Editar</a>
  <a href="{{ url_for('recetas.lista') }}" class="btn btn-secondary">Volver</a>
</div>
{% endblock %}
