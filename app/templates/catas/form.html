{% extends "base.html" %}
{% block title %}Nueva sesión de cata{% endblock %}

{% block content %}
<h1 class="h3 mb-3">Nueva sesión de cata</h1>

<form method="post" class="card p-3">
  <div class="row g-3">
    <div class="col-md-6">
      <label class="form-label">Bache</label>
      <select name="id_bache" class="form-select" required>
        <option value="">Seleccione un bache</option>
        {% for b in baches %}
          <option value="{{ b.id }}">
            {{ b.codigo_bache }} - {{ b.nombre_cerveza }} - {{ b.fecha_coccion }}
          </option>
        {% endfor %}
      </select>
    </div>

    <div class="col-md-6">
      <label class="form-label">Título de la sesión</label>
      <input type="text"
             name="titulo"
             class="form-control"
             placeholder="Ej: Cata clientes Brown Ale marzo">
    </div>

    <div class="col-12">
      <label class="form-label">Descripción</label>
      <textarea name="descripcion" class="form-control" rows="2"></textarea>
    </div>

    <div class="col-12">
      <label class="form-label">Observaciones</label>
      <textarea name="observaciones" class="form-control" rows="2"></textarea>
    </div>

    <div class="col-12">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" name="activa" id="activa" checked>
        <label class="form-check-label" for="activa">
          Crear sesión activa
        </label>
      </div>
    </div>
  </div>

  <div class="mt-3">
    <button class="btn btn-primary">Crear sesión</button>
    <a href="{{ url_for('catas.lista') }}" class="btn btn-secondary">Cancelar</a>
  </div>
</form>
{% endblock %}
